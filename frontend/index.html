
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvatarTalk.Co</title>
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://hnxnvdzrwbtmcohdptfq.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://hnxnvdzrwbtmcohdptfq.supabase.co">
    
    <!-- Social meta tags -->
    <meta property="og:title" content="AvatarTalk.Co">
    <meta name="twitter:title" content="AvatarTalk.Co">
    <meta name="description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta property="og:description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta name="twitter:description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta property="og:image" content="https://avatartalk.co/og-image.png">
    <meta name="twitter:image" content="https://avatartalk.co/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:type" content="website">
    
    <!-- Inline critical CSS for instant render -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #000;
        color: #fff;
      }
      #root { 
        min-height: 100vh; 
        display: flex;
        flex-direction: column;
      }
      /* Initial loading state */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        z-index: 9999;
      }
      .loader-content {
        text-align: center;
      }
      
      /* Animated AvatarTalk Logo */
      .loader-logo {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 24px;
      }
      
      /* Outer rotating ring */
      .logo-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 110px;
        height: 110px;
        border: 2px solid transparent;
        border-top-color: #667eea;
        border-right-color: #764ba2;
        border-radius: 50%;
        animation: rotate 1.5s linear infinite;
      }
      
      /* Second slower ring */
      .logo-ring-2 {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        border: 1.5px solid transparent;
        border-bottom-color: #a78bfa;
        border-left-color: #60a5fa;
        border-radius: 50%;
        animation: rotate 2.5s linear infinite reverse;
      }
      
      /* Brand logo square - matches the actual Logo component */
      .logo-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 64px;
        height: 64px;
        border-radius: 14px;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #4f46e5 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
        animation: logoPulse 2s ease-in-out infinite;
      }
      
      .logo-bot-icon {
        width: 36px;
        height: 36px;
      }
      
      .logo-sparkle {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 18px;
        height: 18px;
      }
      
      /* Speed progress bar below logo */
      .loader-progress {
        width: 120px;
        height: 3px;
        background: rgba(255,255,255,0.1);
        border-radius: 99px;
        overflow: hidden;
        margin: 8px auto 16px;
      }
      
      .loader-progress-bar {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #4f46e5);
        animation: speedBar 1.8s ease-in-out infinite;
      }
      
      @keyframes speedBar {
        0%   { width: 0%;   margin-left: 0%;   opacity: 1; }
        60%  { width: 80%;  margin-left: 10%;  opacity: 1; }
        90%  { width: 15%;  margin-left: 85%;  opacity: 0.6; }
        100% { width: 0%;   margin-left: 100%; opacity: 0; }
      }
      
      @keyframes logoPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1);    box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4); }
        50%       { transform: translate(-50%, -50%) scale(1.06); box-shadow: 0 12px 40px rgba(139, 92, 246, 0.7); }
      }
      
      .loader-text {
        font-size: 24px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
        animation: fadeInOut 2s ease-in-out infinite;
      }
      
      .loader-subtext {
        font-size: 14px;
        color: #94a3b8;
        font-weight: 500;
      }
      
      @keyframes rotate {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      /* Hide loader when app loads */
      .app-loaded #app-loader {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <!-- Initial loading screen -->
    <div id="app-loader">
      <div class="loader-content">
        <div class="loader-logo">
          <!-- Outer rotating rings -->
          <div class="logo-ring"></div>
          <div class="logo-ring-2"></div>
          <!-- Brand logo square (matches Logo.tsx exactly) -->
          <div class="logo-icon">
            <!-- Bot SVG matching favicon.svg + Logo component -->
            <svg class="logo-bot-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="7" y="8" width="10" height="9" rx="1.5" fill="white" opacity="0.95"/>
              <circle cx="10" cy="11" r="0.8" fill="#3b82f6"/>
              <circle cx="14" cy="11" r="0.8" fill="#3b82f6"/>
              <rect x="10.5" y="14" width="3" height="0.6" rx="0.3" fill="#3b82f6"/>
              <circle cx="12" cy="6.5" r="1" fill="white" opacity="0.95"/>
              <rect x="11.5" y="6.5" width="1" height="1.5" fill="white" opacity="0.95"/>
            </svg>
            <!-- Sparkle dot (top-right like Logo component) -->
            <svg class="logo-sparkle" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="9" r="6" fill="#fde047"/>
              <line x1="6" y1="7" x2="8" y2="9" stroke="#fde047" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="12" y1="7" x2="10" y2="9" stroke="#fde047" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <!-- Speed progress bar instead of text -->
        <div class="loader-progress">
          <div class="loader-progress-bar"></div>
        </div>
        <div class="loader-text">AvatarTalk.Co</div>
        <div class="loader-subtext">Loading your AI avatar...</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <!-- Hide HTML loader once React's LoadingOverlay takes over -->
    <script>
      // The React LoadingOverlay (fixed, z-9999) renders on top and handles
      // the transition. We hide the HTML loader shortly after React starts
      // painting so there's no double-loader visible.
      window.addEventListener('DOMContentLoaded', function() {
        // React's LoadingOverlay appears within ~50ms of JS executing.
        // Hide the HTML loader after 300ms so the React overlay is already visible.
        setTimeout(function() {
          document.body.classList.add('app-loaded');
        }, 300);
      });
      
      // Hard fallback: remove HTML loader after 6 seconds regardless
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) { loader.style.opacity = '0'; loader.style.transition = 'opacity 0.3s'; }
      }, 6000);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
