
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvatarTalk.Co</title>
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://hnxnvdzrwbtmcohdptfq.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://hnxnvdzrwbtmcohdptfq.supabase.co">
    
    <!-- Social meta tags -->
    <meta property="og:title" content="AvatarTalk.Co">
    <meta name="twitter:title" content="AvatarTalk.Co">
    <meta name="description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta property="og:description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta name="twitter:description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/bf5994d3-980b-49a2-b98e-6b7a76749a97/id-preview-7d1226b7--3f13907b-5ec4-480a-b091-424fe5ca2573.lovable.app-1771346720410.png">
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/bf5994d3-980b-49a2-b98e-6b7a76749a97/id-preview-7d1226b7--3f13907b-5ec4-480a-b091-424fe5ca2573.lovable.app-1771346720410.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:type" content="website">
    
    <!-- Inline critical CSS for instant render -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #000;
        color: #fff;
      }
      #root { 
        min-height: 100vh; 
        display: flex;
        flex-direction: column;
      }
      /* Initial loading state */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        z-index: 9999;
      }
      .loader-content {
        text-align: center;
      }
      
      /* Animated AvatarTalk Logo */
      .loader-logo {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 24px;
      }
      
      /* Pulsing circle animation */
      .logo-circle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        animation: pulse 2s ease-in-out infinite;
      }
      
      /* Avatar icon in center */
      .logo-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50px;
        height: 50px;
        background: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 700;
        color: #667eea;
        z-index: 2;
        animation: bounce 1s ease-in-out infinite;
      }
      
      /* Rotating ring */
      .logo-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        border: 3px solid transparent;
        border-top-color: #667eea;
        border-right-color: #764ba2;
        border-radius: 50%;
        animation: rotate 1.5s linear infinite;
      }
      
      .loader-text {
        font-size: 24px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
        animation: fadeInOut 2s ease-in-out infinite;
      }
      
      .loader-subtext {
        font-size: 14px;
        color: #94a3b8;
        font-weight: 500;
      }
      
      @keyframes pulse {
        0%, 100% { 
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.6;
        }
        50% { 
          transform: translate(-50%, -50%) scale(1.1);
          opacity: 0.8;
        }
      }
      
      @keyframes bounce {
        0%, 100% { 
          transform: translate(-50%, -50%) translateY(0);
        }
        50% { 
          transform: translate(-50%, -50%) translateY(-5px);
        }
      }
      
      @keyframes rotate {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      /* Hide loader when app loads */
      .app-loaded #app-loader {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <!-- Initial loading screen -->
    <div id="app-loader">
      <div class="loader-content">
        <div class="loader-logo">AvatarTalk.Co</div>
        <div class="loader-spinner"></div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <!-- Hide loader when JS starts -->
    <script>
      // Remove loader as soon as React mounts
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          document.body.classList.add('app-loaded');
        }, 100);
      });
      
      // Fallback: remove loader after 5 seconds
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) loader.style.display = 'none';
      }, 5000);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
