<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow">
    <meta property="og:site_name" content="AvatarTalk.Co">
    <meta property="og:locale" content="en_US">
    <link rel="canonical" href="https://avatartalk.co/">
    <title>AvatarTalk.Co</title>

    <!-- Critical CSS - Inline for instant render -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
      }

      #root { min-height: 100vh; }

      /* Branded loading screen */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }

      /* Logo wrapper (gradient rounded square — matches in-app brand mark) */
      .loader-logo {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 28px;
      }

      .loader-logo-inner {
        position: absolute;
        inset: 8px;
        border-radius: 18px;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #6366f1 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.45);
        animation: pulse 2s ease-in-out infinite;
      }

      .loader-logo-inner svg {
        width: 40px;
        height: 40px;
      }

      /* Concentric spinning rings */
      .loader-ring {
        position: absolute;
        inset: 0;
        border: 2px solid transparent;
        border-top-color: rgba(255, 255, 255, 0.9);
        border-right-color: rgba(255, 255, 255, 0.5);
        border-radius: 20px;
        animation: spin 1.2s linear infinite;
      }

      .loader-ring-outer {
        position: absolute;
        inset: -8px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 24px;
        animation: spin 3s linear infinite reverse;
      }

      /* Brand text */
      .loader-text {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: white;
        text-align: center;
        margin-bottom: 6px;
      }

      .loader-subtext {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
        text-align: center;
        margin-bottom: 28px;
        letter-spacing: 0.02em;
      }

      /* Progress bar */
      .loader-progress {
        width: 240px;
        height: 4px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }

      .loader-progress-bar {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, #ffffff 0%, rgba(255, 255, 255, 0.7) 100%);
        border-radius: 999px;
        width: 0%;
        transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }

      /* Hide loader when React app is ready */
      body.app-loaded #app-loader {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Branded loading screen -->
    <div id="app-loader">
      <div class="loader-logo">
        <div class="loader-ring-outer"></div>
        <div class="loader-ring"></div>
        <div class="loader-logo-inner">
          <!-- AvatarTalk brand mark: chat-window avatar with sparkle -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6.5" y="7.5" width="11" height="10" rx="2" fill="#ffffff" opacity="0.96"/>
            <circle cx="9.6" cy="11.2" r="0.9" fill="#6366f1"/>
            <circle cx="14.4" cy="11.2" r="0.9" fill="#6366f1"/>
            <rect x="10.3" y="14.2" width="3.4" height="0.7" rx="0.35" fill="#6366f1"/>
            <circle cx="12" cy="5.7" r="1.05" fill="#ffffff" opacity="0.96"/>
            <rect x="11.55" y="5.7" width="0.9" height="1.6" fill="#ffffff" opacity="0.96"/>
            <circle cx="18.2" cy="4.2" r="1.6" fill="#fde047"/>
          </svg>
        </div>
      </div>
      <div class="loader-text">AvatarTalk</div>
      <div class="loader-subtext">Preparing your AI experience…</div>
      <div class="loader-progress" role="progressbar" aria-label="Loading">
        <div class="loader-progress-bar" id="app-loader-progress"></div>
      </div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <!-- Vite entry -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Simulated progress + safety fallback -->
    <script>
      (function() {
        var bar = document.getElementById('app-loader-progress');
        var stages = [10, 28, 52, 74, 88];
        var delays = [120, 320, 700, 1200, 1800];
        var timeouts = stages.map(function(pct, i) {
          return setTimeout(function() { if (bar) bar.style.width = pct + '%'; }, delays[i]);
        });

        // Fallback: force-hide loader after 5s if React never mounts
        var fallback = setTimeout(function() {
          console.warn('⚠️ Loading timeout – React did not mount in 5s');
          if (bar) bar.style.width = '100%';
          document.body.classList.add('app-loaded');
          
          // Check if app actually rendered
          var root = document.getElementById('root');
          if (root && root.children.length === 0) {
            console.error('❌ App failed to render – showing error page');
            root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;font-family:system-ui,sans-serif;padding:2rem;text-align:center"><div style="max-width:500px"><div style="font-size:3rem;margin-bottom:1rem">⚠️</div><h1 style="font-size:1.5rem;margin-bottom:1rem;font-weight:600">Application Not Loading</h1><p style="margin-bottom:1.5rem;opacity:0.95;line-height:1.6">The app failed to initialize. Please try:</p><button onclick="location.reload()" style="background:white;color:#667eea;border:none;padding:0.75rem 2rem;border-radius:0.5rem;font-size:1rem;font-weight:600;cursor:pointer;margin:0.5rem">🔄 Reload</button><button onclick="localStorage.clear();sessionStorage.clear();location.reload()" style="background:rgba(255,255,255,0.2);color:white;border:1px solid white;padding:0.75rem 2rem;border-radius:0.5rem;font-size:1rem;font-weight:600;cursor:pointer;margin:0.5rem">🗑️ Clear Cache</button><div style="margin-top:2rem;font-size:0.875rem;opacity:0.7"><a href="/" style="color:white;text-decoration:underline">← Home</a></div></div></div>';
          }
        }, 5000);

        // React calls this when ready
        window.__REACT_MOUNTED__ = function() {
          clearTimeout(fallback);
          timeouts.forEach(clearTimeout);
          if (bar) bar.style.width = '100%';
          setTimeout(function() { document.body.classList.add('app-loaded'); }, 180);
        };
      })();
    </script>
  </body>
</html>
