
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvatarTalk.Co</title>
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://hnxnvdzrwbtmcohdptfq.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://hnxnvdzrwbtmcohdptfq.supabase.co">
    
    <!-- Social meta tags -->
    <meta property="og:title" content="AvatarTalk.Co">
    <meta name="twitter:title" content="AvatarTalk.Co">
    <meta name="description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta property="og:description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta name="twitter:description" content="Create AI avatars that talk, sell & engage visitors 24/7">
    <meta property="og:image" content="https://avatartalk.co/og-image.png">
    <meta name="twitter:image" content="https://avatartalk.co/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:type" content="website">
    
    <!-- Inline critical CSS for instant render -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #000;
        color: #fff;
      }
      #root { 
        min-height: 100vh; 
        display: flex;
        flex-direction: column;
      }
      /* Initial loading state */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        z-index: 9999;
      }
      .loader-content {
        text-align: center;
      }
      
      /* Animated AvatarTalk Logo */
      .loader-logo {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 24px;
      }
      
      /* Pulsing circle animation */
      .logo-circle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        animation: pulse 2s ease-in-out infinite;
      }
      
      /* Avatar icon in center */
      .logo-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60px;
        height: 60px;
        z-index: 2;
        animation: bounce 1s ease-in-out infinite;
      }
      
      .logo-icon svg {
        width: 100%;
        height: 100%;
        fill: #fff;
        filter: drop-shadow(0 2px 8px rgba(102, 126, 234, 0.3));
      }
      
      /* Rotating ring */
      .logo-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        border: 3px solid transparent;
        border-top-color: #667eea;
        border-right-color: #764ba2;
        border-radius: 50%;
        animation: rotate 1.5s linear infinite;
      }
      
      .loader-text {
        font-size: 24px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
        animation: fadeInOut 2s ease-in-out infinite;
      }
      
      .loader-subtext {
        font-size: 14px;
        color: #94a3b8;
        font-weight: 500;
      }
      
      @keyframes pulse {
        0%, 100% { 
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.6;
        }
        50% { 
          transform: translate(-50%, -50%) scale(1.1);
          opacity: 0.8;
        }
      }
      
      @keyframes bounce {
        0%, 100% { 
          transform: translate(-50%, -50%) translateY(0);
        }
        50% { 
          transform: translate(-50%, -50%) translateY(-5px);
        }
      }
      
      @keyframes rotate {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      /* Hide loader when app loads */
      .app-loaded #app-loader {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <!-- Initial loading screen -->
    <div id="app-loader">
      <div class="loader-content">
        <div class="loader-logo">
          <div class="logo-circle"></div>
          <div class="logo-ring"></div>
          <div class="logo-icon">
            <!-- AvatarTalk Logo SVG -->
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <!-- Head circle -->
              <circle cx="50" cy="35" r="18" fill="#667eea" opacity="0.9"/>
              <!-- Body -->
              <ellipse cx="50" cy="65" rx="20" ry="15" fill="#667eea" opacity="0.8"/>
              <!-- Speech bubble -->
              <circle cx="75" cy="25" r="8" fill="#764ba2" opacity="0.9"/>
              <circle cx="80" cy="30" r="5" fill="#764ba2" opacity="0.7"/>
              <!-- Eyes -->
              <circle cx="45" cy="33" r="2" fill="white"/>
              <circle cx="55" cy="33" r="2" fill="white"/>
              <!-- Smile -->
              <path d="M 43 38 Q 50 42 57 38" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <div class="loader-text">AvatarTalk.Co</div>
        <div class="loader-subtext">Loading your AI avatar...</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <!-- Hide loader when JS starts -->
    <script>
      // Remove loader as soon as React mounts
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          document.body.classList.add('app-loaded');
        }, 100);
      });
      
      // Fallback: remove loader after 5 seconds
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) loader.style.display = 'none';
      }, 5000);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
