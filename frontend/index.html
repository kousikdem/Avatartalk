<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvatarTalk.Co</title>

    <!-- Critical CSS - Inline for instant render -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
      }

      #root {
        min-height: 100vh;
      }

      /* Branded loading screen */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Avatar logo */
      .loader-logo {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
      }

      .loader-logo-inner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        animation: pulse 2s ease-in-out infinite;
      }

      .loader-avatar {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        position: relative;
      }

      .loader-avatar::before {
        content: '';
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 24px;
        background: white;
        border-radius: 50%;
      }

      .loader-avatar::after {
        content: '';
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 32px;
        height: 16px;
        background: white;
        border-radius: 50% 50% 0 0;
      }

      /* Spinning ring */
      .loader-ring {
        position: absolute;
        inset: -8px;
        border: 3px solid transparent;
        border-top-color: rgba(255, 255, 255, 0.8);
        border-right-color: rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
      }

      /* Loading text */
      .loader-text {
        font-size: 18px;
        font-weight: 600;
        color: white;
        text-align: center;
        margin-bottom: 8px;
        animation: fadeInOut 1.5s ease-in-out infinite;
      }

      .loader-subtext {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
        text-align: center;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      @keyframes fadeInOut {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      /* Hide loader when React app is ready */
      body.app-loaded #app-loader {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Branded loading screen -->
    <div id="app-loader">
      <div class="loader-logo">
        <div class="loader-ring"></div>
        <div class="loader-logo-inner">
          <div class="loader-avatar"></div>
        </div>
      </div>
      <div class="loader-text">AvatarTalk.Co</div>
      <div class="loader-subtext">Loading your AI experience...</div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <!-- Vite dev client -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback: Remove loader after 5 seconds if React fails -->
    <script>
      (function() {
        var loader = document.getElementById('app-loader');
        var timeout = setTimeout(function() {
          if (loader) {
            document.body.classList.add('app-loaded');
            console.warn('Loading took longer than expected');
          }
        }, 5000);

        // React will call this when it mounts
        window.__REACT_MOUNTED__ = function() {
          clearTimeout(timeout);
          setTimeout(function() {
            document.body.classList.add('app-loaded');
          }, 100);
        };
      })();
    </script>
  </body>
</html>
